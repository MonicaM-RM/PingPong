name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - run: flutter pub get
        working-directory: appIA1.0/PingPong

      - run: flutter build apk --release
        working-directory: appIA1.0/PingPong

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: appIA1.0/PingPong/build/app/outputs/flutter-apk/app-release.apk
